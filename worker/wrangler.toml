name = "smartium-openai-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Comma-separated list, no spaces. Add http://localhost:5174 for local Vite dev.
[vars]
ALLOWED_ORIGINS = "https://smartium.nl,https://www.smartium.nl,http://localhost:5174,http://127.0.0.1:5174"
# Stripe prijs-ID's: aanmaken met `npm run stripe:setup-prices` (zie hieronder), dan hier plakken of in Cloudflare Dashboard.
STRIPE_PRICE_MONTHLY = "price_1TGp5N2NJGvegKCX3uGOU9jx"
STRIPE_PRICE_YEARLY = "price_1TGp5N2NJGvegKCX2rkyePOz"
# Standaard: card,paypal (abonnement + iDEAL vereist SEPA in Stripe). Na SEPA: card,paypal,ideal
# STRIPE_PAYMENT_METHOD_TYPES = "card,paypal,ideal"

# Secrets (nooit in git):
#   cd worker && npx wrangler secret put OPENAI_API_KEY
#   cd worker && npx wrangler secret put STRIPE_SECRET_KEY
#
# Prijzen genereren (eenmalig, lokaal):
#   1) Zet STRIPE_SECRET_KEY=sk_... in worker/.dev.vars (zelfde bestand mag OPENAI_API_KEY bevatten)
#   2) cd worker && npm run stripe:setup-prices
#   3) Kopieer de twee price_... regels naar [vars] hierboven óf naar Worker → Variables in Cloudflare
#   4) npx wrangler deploy
#
# Optioneel: ook in Cloudflare dashboard onder Worker → Settings → Variables
