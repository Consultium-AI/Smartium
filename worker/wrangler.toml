name = "smartium-openai-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Comma-separated list, no spaces. Add http://localhost:5174 for local Vite dev.
[vars]
ALLOWED_ORIGINS = "https://smartium.nl,https://www.smartium.nl,http://localhost:5174,http://127.0.0.1:5174"
STRIPE_PRICE_MONTHLY = "price_1THuz72NJGvegKCX9gOfXLaG"
STRIPE_PRICE_YEARLY = "price_1THuz72NJGvegKCXJVQMpyqY"
STRIPE_PAYMENT_METHOD_TYPES = "ideal"

# Mode: payment (one-time iDEAL). Frontend toont maandelijks/jaarlijks;
# user betaalt handmatig opnieuw na 30/365 dagen.
# Zodra SEPA is goedgekeurd: switch naar recurring prices + mode=subscription in index.ts.
#
# Secrets (nooit in git):
#   cd worker && npx wrangler secret put OPENAI_API_KEY
#   cd worker && npx wrangler secret put STRIPE_SECRET_KEY
#
# Prijzen genereren (eenmalig, lokaal):
#   1) Zet STRIPE_SECRET_KEY=sk_... in worker/.dev.vars
#   2) cd worker && npm run stripe:setup-prices
#   3) Kopieer de twee price_... regels naar [vars] hierboven
#   4) npx wrangler deploy
