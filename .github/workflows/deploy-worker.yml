# Deploy Cloudflare Worker (OpenAI proxy).
# Repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — API Token with Workers Scripts:Edit (and Account read)
#   CLOUDFLARE_ACCOUNT_ID — Dashboard → rechtsonder "Account ID"
#
# Worker billing (Stripe): lokaal `wrangler secret put STRIPE_SECRET_KEY` en in Dashboard
# Variables zetten: STRIPE_PRICE_MONTHLY, STRIPE_PRICE_YEARLY (price_…).
name: Deploy Worker

on:
  push:
    branches: ['main']
    paths: ['worker/**', '.github/workflows/deploy-worker.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      # Zonder secrets faalde de workflow (rood). Deploy dan lokaal: cd worker && npx wrangler deploy
      - name: Deploy Worker to Cloudflare
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::Geen CLOUDFLARE_API_TOKEN of CLOUDFLARE_ACCOUNT_ID in repo-secrets — deploy overgeslagen."
            echo "Voeg ze toe onder Settings → Secrets and variables → Actions, of deploy handmatig met wrangler."
            exit 0
          fi
          npx wrangler deploy
