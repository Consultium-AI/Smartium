# Deploy Cloudflare Worker (OpenAI proxy).
# Repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — API Token with Workers Scripts:Edit (and Account read)
#   CLOUDFLARE_ACCOUNT_ID — Dashboard → rechtsonder "Account ID"
name: Deploy Worker

on:
  push:
    branches: ['main']
    paths: ['worker/**', '.github/workflows/deploy-worker.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Verify Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is leeg. Voeg toe onder GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is leeg. Zie Cloudflare Dashboard → overzicht → Account ID."
            exit 1
          fi

      # Direct wrangler uit worker/node_modules (betrouwbaarder dan wrangler-action + eigen npx)
      - name: Deploy Worker to Cloudflare
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
