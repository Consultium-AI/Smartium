# Deploy Cloudflare Worker (OpenAI proxy).
# Repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — API Token with Workers Scripts:Edit (and Account read)
#   CLOUDFLARE_ACCOUNT_ID — Dashboard → rechtsonder "Account ID"
#
# Worker billing (Stripe): lokaal `wrangler secret put STRIPE_SECRET_KEY` en in Dashboard
# Variables zetten: STRIPE_PRICE_MONTHLY, STRIPE_PRICE_YEARLY (price_…).
name: Deploy Worker

on:
  push:
    branches: ['main', 'master']
    paths: ['worker/**', '.github/workflows/deploy-worker.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install worker deps
        working-directory: worker
        run: npm ci

      - name: Resolve Cloudflare credentials
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          TOKEN="$CLOUDFLARE_API_TOKEN"
          if [ -z "$TOKEN" ]; then
            TOKEN="$CF_API_TOKEN"
          fi

          ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID"
          if [ -z "$ACCOUNT_ID" ]; then
            ACCOUNT_ID="$CF_ACCOUNT_ID"
          fi

          if [ -z "$TOKEN" ]; then
            echo "::warning::Geen Cloudflare API token gevonden (CLOUDFLARE_API_TOKEN/CF_API_TOKEN). Deploy wordt overgeslagen."
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$ACCOUNT_ID" ]; then
            echo "::warning::Geen Cloudflare account id gevonden (CLOUDFLARE_ACCOUNT_ID/CF_ACCOUNT_ID). Deploy wordt overgeslagen."
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          echo "cf_api_token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "cf_account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      # Direct wrangler uit worker/node_modules (betrouwbaarder dan wrangler-action + eigen npx)
      - name: Deploy Worker to Cloudflare
        if: steps.cf.outputs.deploy_enabled == 'true'
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf.outputs.cf_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.cf.outputs.cf_account_id }}
        run: npx wrangler deploy
